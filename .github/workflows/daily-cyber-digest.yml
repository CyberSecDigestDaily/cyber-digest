name: Daily Cyber Digest

on:
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Run digest pipeline
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          NVD_API_KEY:        ${{ secrets.NVD_API_KEY }}
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
        run: python digest.py

      - name: Fetch CISA KEV snapshot
        run: |
          curl -sSf -A "CyberDigest/2.0" \
            "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json" \
            -o site/kev.json || echo '{"vulnerabilities":[]}' > site/kev.json

      - name: Commit all outputs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json site/kev.json site/feed.json
          git diff --staged --quiet || git commit -m "chore: digest + KEV + feed snapshot [skip ci]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
