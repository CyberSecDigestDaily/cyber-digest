name: Daily Cyber Digest

on:
  schedule:
    # 09:00 UTC daily
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # required to commit digest.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation

      - name: Install Python dependencies
        run: pip install feedparser weasyprint requests

      - name: Run digest
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
          NVD_API_KEY:        ${{ secrets.NVD_API_KEY }}
          DISCORD_RELAY_URL:  ${{ secrets.DISCORD_RELAY_URL }}
          DISCORD_AUTH_TOKEN: ${{ secrets.DISCORD_AUTH_TOKEN }}
        run: python digest.py

      - name: Commit digest.json to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          git diff --staged --quiet || git commit -m "chore: daily digest update [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
