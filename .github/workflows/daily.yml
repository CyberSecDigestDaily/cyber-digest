name: Daily Cyber Digest

# Single source of truth for the digest pipeline.
# Replaces the former daily-cyber-digest.yml and daily-digest.yml, which ran on
# overlapping crons and pushed to main without rebasing — causing divergence,
# silent push failures, and ~3 weeks of stale digest.json. Delete those two files.

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily (matches CLAUDE.md target)
  workflow_dispatch:

# Never let two runs (e.g. a manual dispatch + the cron) race on the push.
concurrency:
  group: cyber-digest-pipeline
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          NVD_API_KEY:        ${{ secrets.NVD_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
          DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
        run: python digest.py

      - name: Commit and push outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json site/digest.json site/kev.json site/feed.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: digest $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Rebase onto any concurrent change before pushing to avoid divergence.
          git pull --rebase --autostash origin main
          git push

      - name: Alert Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -sS -H "Content-Type: application/json" \
              -d "{\"content\":\"🔴 **Cyber Digest pipeline FAILED** — run ${GITHUB_RUN_ID}. https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
              "$DISCORD_WEBHOOK" || true
          fi
