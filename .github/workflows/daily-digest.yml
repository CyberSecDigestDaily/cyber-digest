name: Daily Cyber Digest

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC every day
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  update-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit digest.json back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libffi-dev libjpeg-dev libopenjp2-7

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser weasyprint requests

      - name: Generate digest
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          NVD_API_KEY:         ${{ secrets.NVD_API_KEY }}
          DISCORD_RELAY_URL:   ${{ secrets.DISCORD_RELAY_URL }}
          DISCORD_AUTH_TOKEN:  ${{ secrets.DISCORD_AUTH_TOKEN }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
        run: python digest.py

      - name: Commit and push digest.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest.json
          # Only commit if the file actually changed
          git diff --staged --quiet || \
            git commit -m "chore: digest $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
